services:
  - type: web
    name: docsign-backend
    env: node
    plan: free
    buildCommand: npm ci --include=dev && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: MONGODB_URI
        fromConfig: true # Or provide a value
      - key: JWT_SECRET
        generateValue: true
      - key: CLIENT_URL
        fromConfig: true # Provide Vercel URL here
      - key: UPLOAD_DIR
        value: ./uploads
